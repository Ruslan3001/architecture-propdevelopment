---
# Роль с привилегированным доступом (включая secrets)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-role
  namespace: default
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
# Роль для настройки прикладных ресурсов (без доступа к secrets)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: editor-role
  namespace: default
rules:
- apiGroups: ["", "apps", "networking.k8s.io"]
  resources: ["pods", "deployments", "services", "configmaps", "ingresses", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Роль только для чтения
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: viewer-role
  namespace: default
rules:
- apiGroups: ["", "apps", "networking.k8s.io"]
  resources: ["pods", "deployments", "services", "configmaps", "ingresses"]
  verbs: ["get", "list", "watch"]