---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: binding-admin
  namespace: default
subjects:
- kind: ServiceAccount
  name: user-devops
  namespace: default
roleRef:
  kind: Role
  name: admin-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: binding-editor
  namespace: default
subjects:
- kind: ServiceAccount
  name: user-developer
  namespace: default
roleRef:
  kind: Role
  name: editor-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: binding-viewer
  namespace: default
subjects:
- kind: ServiceAccount
  name: user-manager
  namespace: default
roleRef:
  kind: Role
  name: viewer-role
  apiGroup: rbac.authorization.k8s.io